<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a0810">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MijnWijn</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0408;
  --surface: #170810;
  --surface2: #210d18;
  --border: #3a1828;
  --accent: #9b2d4a;
  --accent2: #c4425f;
  --gold: #c9a96e;
  --text: #f0e6ea;
  --muted: #8a6d78;
  --rood-c: #e05070;
  --wit-c: #5fa8e8;
  --rose-c: #e890aa;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
.hdr { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 14px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { font-family: 'Cormorant Garamond', serif; font-size: 21px; color: var(--gold); }
.logo em { font-style: italic; }
.hdr-btns { display: flex; gap: 6px; }
.ico-btn { background: none; border: 1px solid var(--border); color: var(--muted); width: 34px; height: 34px; border-radius: 7px; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; }
.ico-btn:hover { border-color: var(--accent2); color: var(--accent2); }

/* DRIVE BAR */
.drive-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 5px 14px; font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 7px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); flex-shrink: 0; }
.dot.ok { background: #4caf50; }
.dot.busy { background: var(--gold); animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* TABS */
.tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
.tab { flex: 1; padding: 10px 8px; text-align: center; font-size: 11px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; text-transform: uppercase; letter-spacing: .5px; }
.tab.on { color: var(--gold); border-bottom-color: var(--gold); }

/* FILTER PANEL */
.filters { background: var(--surface); border-bottom: 1px solid var(--border); }
.frow { display: flex; align-items: center; gap: 5px; padding: 5px 10px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); }
.frow:last-child { border-bottom: none; }
.frow::-webkit-scrollbar { display: none; }
.flabel { font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); flex-shrink: 0; min-width: 36px; }
.chip { flex-shrink: 0; padding: 4px 9px; border-radius: 14px; border: 1px solid var(--border); background: none; color: var(--muted); font-size: 11px; cursor: pointer; font-family: 'DM Sans', sans-serif; white-space: nowrap; }
.chip.on { border-color: var(--accent); background: var(--accent); color: #fff; }
.chip-score.on { border-color: var(--gold); background: rgba(201,169,110,.15); color: var(--gold); }

/* DROPDOWN FILTERS */
.droprow { display: flex; gap: 6px; padding: 6px 10px; background: var(--surface); border-bottom: 1px solid var(--border); }
.droprow select { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 12px; padding: 5px 8px; border-radius: 7px; font-family: 'DM Sans', sans-serif; outline: none; cursor: pointer; }

/* SEARCH + SORT */
.searchrow { padding: 7px 10px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; gap: 6px; align-items: center; }
.search-wrap { flex: 1; position: relative; }
.search-wrap input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 7px 10px 7px 30px; color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; }
.search-wrap input::placeholder { color: var(--muted); }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 13px; pointer-events: none; }
.sort-sel { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 12px; padding: 7px 7px; border-radius: 7px; font-family: 'DM Sans', sans-serif; outline: none; cursor: pointer; flex-shrink: 0; }

/* COUNT */
.countbar { padding: 4px 12px; font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; }

/* WINE LIST */
.wlist { padding: 4px 8px 80px; }
.wcard { background: var(--surface); border-bottom: 1px solid var(--border); border-radius: 0; padding: 7px 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
.wlist .wcard:first-child { border-radius: 8px 8px 0 0; margin-top: 2px; }
.wlist .wcard:last-child { border-radius: 0 0 8px 8px; border-bottom: none; }
.wlist .wcard:only-child { border-radius: 8px; }
.wcard:hover { background: var(--surface2); }

.wdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dr { background: var(--rood-c); }
.dw { background: var(--wit-c); }
.dro { background: var(--rose-c); }

.wbody { flex: 1; min-width: 0; }
.wrow1 { display: flex; align-items: baseline; gap: 6px; }
.wname { font-size: 13px; font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.wsoort { font-size: 10px; padding: 1px 5px; border-radius: 3px; flex-shrink: 0; font-weight: 500; }
.sr { background: rgba(224,80,112,.12); color: var(--rood-c); }
.sw { background: rgba(95,168,232,.12); color: var(--wit-c); }
.sro { background: rgba(232,144,170,.12); color: var(--rose-c); }

.wrow2 { display: flex; align-items: center; gap: 8px; margin-top: 2px; font-size: 11px; color: var(--muted); }
.wrow2 .wp { margin-left: auto; flex-shrink: 0; }
.wstars { font-size: 10px; color: var(--gold); letter-spacing: -.5px; flex-shrink: 0; }
.wstars.none { color: var(--border); }

.empty { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 14px; }

/* FAB */
.fab { position: fixed; bottom: 22px; right: 18px; width: 52px; height: 52px; background: var(--accent); border-radius: 50%; border: none; color: #fff; font-size: 22px; cursor: pointer; box-shadow: 0 3px 16px rgba(155,45,74,.5); display: flex; align-items: center; justify-content: center; z-index: 150; }
.fab:active { transform: scale(.92); }

/* MODAL / DETAIL */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 200; display: none; align-items: flex-end; }
.overlay.open { display: flex; }
.sheet { background: var(--surface); border-radius: 18px 18px 0 0; width: 100%; max-height: 92vh; overflow-y: auto; padding: 16px 18px 36px; }
.handle { width: 32px; height: 3px; background: var(--border); border-radius: 2px; margin: 0 auto 14px; }
.mhdr { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
.mtitle { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 600; flex: 1; line-height: 1.3; }
.mclose { background: var(--surface2); border: none; color: var(--muted); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 14px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.mstars { font-size: 22px; color: var(--gold); margin-bottom: 12px; }
.mgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.mf { background: var(--surface2); border-radius: 7px; padding: 8px 10px; }
.mf.full { grid-column: 1/-1; }
.mfl { font-size: 10px; text-transform: uppercase; letter-spacing: .7px; color: var(--muted); margin-bottom: 3px; }
.mfv { font-size: 13px; }
.mbtns { display: flex; gap: 7px; }
.mbtn { padding: 9px; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; border: none; font-weight: 500; flex: 1; }
.mbtn-sec { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.mbtn-del { background: rgba(196,66,95,.1); color: var(--accent2); border: 1px solid rgba(196,66,95,.25); }

/* FORM */
.form-ov { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 300; display: none; align-items: flex-end; }
.form-ov.open { display: flex; }
.fsheet { background: var(--surface); border-radius: 18px 18px 0 0; width: 100%; max-height: 96vh; overflow-y: auto; padding: 16px 18px 36px; }
.ftitle { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 600; margin-bottom: 14px; }
.frow2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.fl { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 5px; }
.fi, .fs, .fta { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 8px 10px; color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; margin-bottom: 10px; }
.fi:focus, .fs:focus, .fta:focus { border-color: var(--accent2); }
.fta { resize: vertical; min-height: 60px; }
.spicker { display: flex; gap: 3px; margin-bottom: 10px; }
.sbtn { font-size: 20px; cursor: pointer; color: var(--border); background: none; border: none; padding: 2px; }
.sbtn.lit { color: var(--gold); }
.fbtns { display: flex; gap: 7px; margin-top: 4px; }
.fbtn { padding: 10px; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; border: none; font-weight: 500; flex: 1; }
.fbtn-pri { background: var(--accent); color: #fff; }
.fbtn-sec { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

/* STATS */
.sview { padding: 12px; display: none; }
.sview.on { display: block; }
.sgrid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.scard { background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 12px; margin-bottom: 8px; }
.scard-title { font-family: 'Cormorant Garamond', serif; font-size: 15px; color: var(--gold); margin-bottom: 10px; }
.snum { font-size: 30px; font-family: 'Cormorant Garamond', serif; color: var(--gold); }
.slabel { font-size: 10px; color: var(--muted); margin-top: 1px; }
.srow { display: flex; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.srow:last-child { border-bottom: none; }
.sbar-wrap { flex: 1; margin: 0 8px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.sbar { height: 100%; border-radius: 2px; background: var(--accent); }
.sval { font-size: 11px; min-width: 24px; text-align: right; }

/* TOAST */
.toast { position: fixed; bottom: 82px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border); padding: 8px 16px; border-radius: 7px; font-size: 12px; z-index: 500; display: none; white-space: nowrap; }
.toast.show { display: block; animation: tf 2.5s forwards; }
@keyframes tf { 0%{opacity:0;transform:translateX(-50%) translateY(4px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 80%{opacity:1} 100%{opacity:0} }

@media(min-width:600px) {
  .wlist, .sview { max-width: 660px; margin: 0 auto; }
  .sheet, .fsheet { max-width: 580px; margin: 0 auto; border-radius: 16px; }
  .overlay, .form-ov { align-items: center; justify-content: center; }
}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">Mijn<em>Wijn</em></div>
  <div class="hdr-btns">
    <button class="ico-btn" onclick="syncDrive()" title="Sync Google Drive">☁</button>
    <button class="ico-btn" onclick="exportCSV()" title="Exporteer CSV">↓</button>
  </div>
</div>

<div class="drive-bar">
  <div class="dot" id="driveDot"></div>
  <span id="driveLabel">Klik ☁ om te synchroniseren</span>
</div>

<div class="tabs">
  <div class="tab on" onclick="switchTab('list',this)">Collectie</div>
  <div class="tab" onclick="switchTab('stats',this)">Statistieken</div>
</div>

<div id="listView">
  <!-- Filter 1: Soort (single select) -->
  <div class="filters">
    <div class="frow">
      <span class="flabel">Soort</span>
      <button class="chip on" data-g="soort" data-v="all" onclick="setChip(this)">Alles</button>
      <button class="chip" data-g="soort" data-v="Rood" onclick="setChip(this)">🍷 Rood</button>
      <button class="chip" data-g="soort" data-v="Wit" onclick="setChip(this)">🥂 Wit</button>
      <button class="chip" data-g="soort" data-v="Rose" onclick="setChip(this)">🌸 Rosé</button>
    </div>
    <!-- Filter 2: Score (multi select) -->
    <div class="frow">
      <span class="flabel">Score</span>
      <button class="chip chip-score" data-g="score" data-v="5" onclick="toggleScore(this)">★★★★★</button>
      <button class="chip chip-score" data-g="score" data-v="4" onclick="toggleScore(this)">★★★★</button>
      <button class="chip chip-score" data-g="score" data-v="3" onclick="toggleScore(this)">★★★</button>
      <button class="chip chip-score" data-g="score" data-v="2" onclick="toggleScore(this)">★★</button>
      <button class="chip chip-score" data-g="score" data-v="1" onclick="toggleScore(this)">★</button>
      <button class="chip chip-score" data-g="score" data-v="0" onclick="toggleScore(this)">Niet gescoord</button>
    </div>
  </div>

  <!-- Filter 3+4: Winkel + Land -->
  <div class="droprow">
    <select id="selWinkel" onchange="renderList()">
      <option value="">Alle winkels</option>
    </select>
    <select id="selLand" onchange="renderList()">
      <option value="">Alle landen</option>
    </select>
  </div>

  <!-- Search + Sort -->
  <div class="searchrow">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="search" id="searchInput" placeholder="Naam, producent, druif…" oninput="renderList()">
    </div>
    <select class="sort-sel" id="sortSel" onchange="renderList()">
      <option value="datum_desc">Datum ↓</option>
      <option value="datum_asc">Datum ↑</option>
      <option value="score_desc">Score ↓</option>
      <option value="score_asc">Score ↑</option>
      <option value="naam">Naam A→Z</option>
    </select>
  </div>

  <div class="countbar"><span id="countTxt">0 wijnen</span><span id="filterSummary"></span></div>
  <div class="wlist" id="wineList"></div>
</div>

<!-- Stats tab -->
<div class="sview" id="statsView">
  <div class="sgrid3">
    <div class="scard" style="text-align:center"><div class="snum" id="s-tot">0</div><div class="slabel">Wijnen</div></div>
    <div class="scard" style="text-align:center"><div class="snum" id="s-avg">—</div><div class="slabel">Gem. score</div></div>
    <div class="scard" style="text-align:center"><div class="snum" id="s-5star">0</div><div class="slabel">★★★★★</div></div>
  </div>
  <div class="scard"><div class="scard-title">Top landen</div><div id="s-landen"></div></div>
  <div class="scard"><div class="scard-title">Soort verdeling</div><div id="s-soort"></div></div>
  <div class="scard"><div class="scard-title">Top winkels</div><div id="s-winkels"></div></div>
  <div class="scard"><div class="scard-title">5-sterren wijnen</div><div id="s-top5"></div></div>
</div>

<!-- Detail Modal -->
<div class="overlay" id="detailOv" onclick="closeOv(event,'detailOv')">
  <div class="sheet">
    <div class="handle"></div>
    <div class="mhdr">
      <div class="mtitle" id="m-naam"></div>
      <button class="mclose" onclick="closeById('detailOv')">✕</button>
    </div>
    <div class="mstars" id="m-stars"></div>
    <div class="mgrid">
      <div class="mf"><div class="mfl">Producent</div><div class="mfv" id="m-prod"></div></div>
      <div class="mf"><div class="mfl">Soort</div><div class="mfv" id="m-soort"></div></div>
      <div class="mf"><div class="mfl">Land</div><div class="mfv" id="m-land"></div></div>
      <div class="mf"><div class="mfl">Jaar</div><div class="mfv" id="m-jaar"></div></div>
      <div class="mf"><div class="mfl">Regio</div><div class="mfv" id="m-regio"></div></div>
      <div class="mf"><div class="mfl">Druif</div><div class="mfv" id="m-druif"></div></div>
      <div class="mf"><div class="mfl">Winkel</div><div class="mfv" id="m-winkel"></div></div>
      <div class="mf"><div class="mfl">Datum / Prijs</div><div class="mfv" id="m-dp"></div></div>
      <div class="mf full" id="m-opwrap"><div class="mfl">Opmerkingen</div><div class="mfv" id="m-op"></div></div>
    </div>
    <div class="mbtns">
      <button class="mbtn mbtn-sec" onclick="editWijn()">✏ Bewerken</button>
      <button class="mbtn mbtn-del" onclick="deleteWijn()">🗑 Verwijder</button>
    </div>
  </div>
</div>

<!-- Add/Edit Form -->
<div class="form-ov" id="formOv" onclick="closeOv(event,'formOv')">
  <div class="fsheet">
    <div class="handle"></div>
    <div class="ftitle" id="fTitle">Wijn toevoegen</div>
    <input type="hidden" id="fId">
    <label class="fl">Wijnnaam *</label>
    <input class="fi" id="fNaam" placeholder="b.v. 2022 - Dievole Chianti Classico">
    <div class="frow2">
      <div><label class="fl">Producent</label><input class="fi" id="fProd" placeholder="Producent"></div>
      <div><label class="fl">Jaar</label><input class="fi" id="fJaar" type="number" placeholder="2022"></div>
    </div>
    <div class="frow2">
      <div><label class="fl">Soort</label>
        <select class="fs" id="fSoort">
          <option value="Rood">Rood</option>
          <option value="Wit">Wit</option>
          <option value="Rose">Rosé</option>
        </select>
      </div>
      <div><label class="fl">Land</label>
        <select class="fs" id="fLand">
          <option value="">— kies —</option>
          <option>Italie</option><option>Frankrijk</option><option>Spanje</option>
          <option>Portugal</option><option>Argentinie</option><option>Chili</option>
          <option>Zuid Afrika</option><option>Nw Zeeland</option><option>Australie</option>
          <option>Oostenrijk</option><option>Duitsland</option><option>Amerika</option>
          <option>Anders</option>
        </select>
      </div>
    </div>
    <div class="frow2">
      <div><label class="fl">Regio</label><input class="fi" id="fRegio" placeholder="b.v. Toscane"></div>
      <div><label class="fl">Subregio</label><input class="fi" id="fSubregio" placeholder="b.v. Chianti"></div>
    </div>
    <label class="fl">Druif(soort)</label>
    <input class="fi" id="fDruif" placeholder="b.v. Sangiovese">
    <div class="frow2">
      <div><label class="fl">Winkel</label><input class="fi" id="fWinkel" placeholder="b.v. Henri Bloem"></div>
      <div><label class="fl">Prijs (€)</label><input class="fi" id="fPrijs" type="number" step="0.01" placeholder="12.50"></div>
    </div>
    <label class="fl">Aankoopdatum</label>
    <input class="fi" id="fDatum" type="date">
    <label class="fl">Score</label>
    <div class="spicker" id="spicker">
      <button class="sbtn" onclick="setScore(0)">☆</button>
      <button class="sbtn" onclick="setScore(1)">★</button>
      <button class="sbtn" onclick="setScore(2)">★</button>
      <button class="sbtn" onclick="setScore(3)">★</button>
      <button class="sbtn" onclick="setScore(4)">★</button>
      <button class="sbtn" onclick="setScore(5)">★</button>
    </div>
    <label class="fl">Opmerkingen</label>
    <textarea class="fta" id="fOp" placeholder="Proefnotities, gelegenheid…"></textarea>
    <div class="fbtns">
      <button class="fbtn fbtn-sec" onclick="closeById('formOv')">Annuleer</button>
      <button class="fbtn fbtn-pri" onclick="saveWijn()">Opslaan</button>
    </div>
  </div>
</div>

<button class="fab" id="fabBtn" onclick="openAddForm()">＋</button>

// ── STATE ──────────────────────────────────────────────────────────────
let wines = JSON.parse(JSON.stringify(INITIAL_DATA));
let fSoort = 'all';
let fScores = new Set(); // empty = all scores
let fWinkelVal = '';
let fLandVal = '';
let formScore = 0;
let currentWijn = null;
let driveFileId = null;
const DRIVE_FILE = 'mijnwijn_data.json';

// ── INIT DROPDOWNS ─────────────────────────────────────────────────────
function initDropdowns() {
  const winkels = [...new Set(wines.map(w => w.winkel).filter(Boolean))].sort();
  const landen = [...new Set(wines.map(w => w.land).filter(Boolean))].sort();
  const ws = document.getElementById('selWinkel');
  const ls = document.getElementById('selLand');
  winkels.forEach(v => ws.add(new Option(v, v)));
  landen.forEach(v => ls.add(new Option(v, v)));
}

// ── FILTER LOGIC ───────────────────────────────────────────────────────
function setChip(el) {
  document.querySelectorAll('[data-g="soort"]').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  fSoort = el.dataset.v;
  renderList();
}

function toggleScore(el) {
  const v = el.dataset.v;
  if (fScores.has(v)) { fScores.delete(v); el.classList.remove('on'); }
  else { fScores.add(v); el.classList.add('on'); }
  renderList();
}

function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSel').value;
  fWinkelVal = document.getElementById('selWinkel').value;
  fLandVal = document.getElementById('selLand').value;

  let list = wines.filter(w => {
    if (fSoort !== 'all' && w.soort !== fSoort) return false;
    if (fScores.size > 0 && !fScores.has(String(w.score))) return false;
    if (fWinkelVal && w.winkel !== fWinkelVal) return false;
    if (fLandVal && w.land !== fLandVal) return false;
    if (q) {
      const hay = [w.naam, w.producent, w.druif, w.land, w.regio, w.winkel, w.opmerkingen].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  list.sort((a, b) => {
    if (sort === 'score_desc') return (b.score||0) - (a.score||0);
    if (sort === 'score_asc')  return (a.score||0) - (b.score||0);
    if (sort === 'naam')       return (a.naam||'').localeCompare(b.naam||'');
    if (sort === 'datum_desc') return (b.datum||'').localeCompare(a.datum||'');
    if (sort === 'datum_asc')  return (a.datum||'').localeCompare(b.datum||'');
    return 0;
  });

  document.getElementById('countTxt').textContent = `${list.length} wijnen`;

  // Active filter summary
  const parts = [];
  if (fSoort !== 'all') parts.push(fSoort === 'Rose' ? 'Rosé' : fSoort);
  if (fScores.size > 0) parts.push([...fScores].map(s => s === '0' ? '☆' : '★'.repeat(+s)).join(' / '));
  if (fWinkelVal) parts.push(fWinkelVal);
  if (fLandVal) parts.push(fLandVal);
  document.getElementById('filterSummary').textContent = parts.length ? parts.join(' · ') : '';

  const container = document.getElementById('wineList');
  if (!list.length) {
    container.innerHTML = '<div class="empty">🍷 Geen resultaten</div>';
    return;
  }

  container.innerHTML = list.map(w => {
    const dotC = w.soort === 'Wit' ? 'dw' : w.soort === 'Rose' ? 'dro' : 'dr';
    const tagC = w.soort === 'Wit' ? 'sw' : w.soort === 'Rose' ? 'sro' : 'sr';
    const soortL = w.soort === 'Rose' ? 'Rosé' : (w.soort || '');
    const stars = w.score ? '★'.repeat(w.score) + '☆'.repeat(5 - w.score) : '☆☆☆☆☆';
    const starsC = w.score ? 'wstars' : 'wstars none';
    const druifShort = w.druif ? w.druif.split(',')[0].trim() : '';
    const prijs = w.prijs ? `€${w.prijs.toFixed(2)}` : '';
    const parts2 = [w.land, w.jaar, druifShort].filter(Boolean);
    return `<div class="wcard" onclick="openDetail('${w.id}')">
  <div class="wdot ${dotC}"></div>
  <div class="wbody">
    <div class="wrow1">
      <div class="wname">${escH(w.naam)}</div>
      <span class="wsoort ${tagC}">${soortL}</span>
    </div>
    <div class="wrow2">
      <span>${parts2.join(' · ')}</span>
      <span class="${starsC}">${stars}</span>
      ${prijs ? `<span class="wp">${prijs}</span>` : ''}
    </div>
  </div>
</div>`;
  }).join('');
}

function escH(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── DETAIL ─────────────────────────────────────────────────────────────
function openDetail(id) {
  currentWijn = wines.find(w => w.id === id);
  if (!currentWijn) return;
  const w = currentWijn;
  document.getElementById('m-naam').textContent = w.naam;
  document.getElementById('m-stars').textContent = w.score ? '★'.repeat(w.score) + '☆'.repeat(5-w.score) : '☆☆☆☆☆';
  document.getElementById('m-prod').textContent = w.producent || '—';
  document.getElementById('m-soort').textContent = w.soort === 'Rose' ? 'Rosé' : (w.soort || '—');
  document.getElementById('m-land').textContent = w.land || '—';
  document.getElementById('m-jaar').textContent = w.jaar || '—';
  document.getElementById('m-regio').textContent = [w.regio, w.subregio].filter(Boolean).join(' › ') || '—';
  document.getElementById('m-druif').textContent = w.druif || '—';
  document.getElementById('m-winkel').textContent = w.winkel || '—';
  const dp = [w.datum ? '📅 ' + w.datum : '', w.prijs ? '€' + w.prijs.toFixed(2) : ''].filter(Boolean).join('  ');
  document.getElementById('m-dp').textContent = dp || '—';
  document.getElementById('m-opwrap').style.display = w.opmerkingen ? '' : 'none';
  document.getElementById('m-op').textContent = w.opmerkingen;
  document.getElementById('detailOv').classList.add('open');
}

function closeOv(e, id) { if (e.target.id === id || e.target.classList.contains('overlay')) closeById(id); }
function closeById(id) { document.getElementById(id).classList.remove('open'); }

function editWijn() { closeById('detailOv'); openEditForm(currentWijn); }
function deleteWijn() {
  if (!confirm(`"${currentWijn.naam}" verwijderen?`)) return;
  wines = wines.filter(w => w.id !== currentWijn.id);
  closeById('detailOv');
  renderList(); renderStats();
  autoSave();
  toast('🗑 Verwijderd');
}

// ── FORM ───────────────────────────────────────────────────────────────
function openAddForm() {
  document.getElementById('fTitle').textContent = 'Wijn toevoegen';
  document.getElementById('fId').value = '';
  ['fNaam','fProd','fRegio','fSubregio','fDruif','fWinkel','fOp'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fJaar').value = '';
  document.getElementById('fPrijs').value = '';
  document.getElementById('fSoort').value = 'Rood';
  document.getElementById('fLand').value = '';
  document.getElementById('fDatum').value = new Date().toISOString().split('T')[0];
  formScore = 0; updateStars();
  document.getElementById('formOv').classList.add('open');
}

function openEditForm(w) {
  document.getElementById('fTitle').textContent = 'Wijn bewerken';
  document.getElementById('fId').value = w.id;
  document.getElementById('fNaam').value = w.naam || '';
  document.getElementById('fProd').value = w.producent || '';
  document.getElementById('fJaar').value = w.jaar || '';
  document.getElementById('fSoort').value = w.soort || 'Rood';
  document.getElementById('fLand').value = w.land || '';
  document.getElementById('fRegio').value = w.regio || '';
  document.getElementById('fSubregio').value = w.subregio || '';
  document.getElementById('fDruif').value = w.druif || '';
  document.getElementById('fWinkel').value = w.winkel || '';
  document.getElementById('fPrijs').value = w.prijs || '';
  document.getElementById('fDatum').value = w.datum || '';
  document.getElementById('fOp').value = w.opmerkingen || '';
  formScore = w.score || 0; updateStars();
  document.getElementById('formOv').classList.add('open');
}

function setScore(n) { formScore = n; updateStars(); }
function updateStars() {
  document.querySelectorAll('.sbtn').forEach((b, i) => b.classList.toggle('lit', i > 0 && i <= formScore));
}

function saveWijn() {
  const naam = document.getElementById('fNaam').value.trim();
  if (!naam) { alert('Wijnnaam is verplicht'); return; }
  const id = document.getElementById('fId').value;
  const w = {
    id: id || String(Date.now()),
    naam,
    producent: document.getElementById('fProd').value.trim(),
    jaar: parseInt(document.getElementById('fJaar').value) || null,
    soort: document.getElementById('fSoort').value,
    land: document.getElementById('fLand').value,
    regio: document.getElementById('fRegio').value.trim(),
    subregio: document.getElementById('fSubregio').value.trim(),
    druif: document.getElementById('fDruif').value.trim(),
    winkel: document.getElementById('fWinkel').value.trim(),
    prijs: parseFloat(document.getElementById('fPrijs').value) || null,
    datum: document.getElementById('fDatum').value,
    score: formScore,
    opmerkingen: document.getElementById('fOp').value.trim(),
  };
  if (id) { const i = wines.findIndex(x => x.id === id); if (i >= 0) wines[i] = w; }
  else wines.unshift(w);
  closeById('formOv');
  renderList(); renderStats();
  autoSave();
  toast(id ? '✓ Bijgewerkt' : '✓ Toegevoegd');
}

// ── STATS ──────────────────────────────────────────────────────────────
function renderStats() {
  const scored = wines.filter(w => w.score > 0);
  const avg = scored.length ? (scored.reduce((s,w) => s+w.score, 0)/scored.length).toFixed(1) : '—';
  document.getElementById('s-tot').textContent = wines.length;
  document.getElementById('s-avg').textContent = avg;
  document.getElementById('s-5star').textContent = wines.filter(w => w.score === 5).length;

  const count = key => {
    const m = {};
    wines.forEach(w => { if(w[key]) m[w[key]] = (m[w[key]]||0)+1; });
    return Object.entries(m).sort((a,b) => b[1]-a[1]);
  };
  const bar = (entries, max=10) => entries.slice(0,max).map(([k,v]) =>
    `<div class="srow"><span style="min-width:90px;font-size:11px">${escH(k)}</span><div class="sbar-wrap"><div class="sbar" style="width:${Math.round(v/entries[0][1]*100)}%"></div></div><span class="sval">${v}</span></div>`
  ).join('');

  document.getElementById('s-landen').innerHTML = bar(count('land'));
  const soortCounts = count('soort');
  document.getElementById('s-soort').innerHTML = soortCounts.map(([k,v]) =>
    `<div class="srow"><span style="min-width:60px;font-size:11px">${k==='Rose'?'Rosé':k}</span><div class="sbar-wrap"><div class="sbar" style="width:${Math.round(v/wines.length*100)}%;background:${k==='Wit'?'#5fa8e8':k==='Rose'?'#e890aa':'#e05070'}"></div></div><span class="sval">${v}</span></div>`
  ).join('');
  document.getElementById('s-winkels').innerHTML = bar(count('winkel'));
  const top5 = wines.filter(w => w.score === 5);
  document.getElementById('s-top5').innerHTML = top5.length
    ? top5.map(w => `<div class="srow" style="cursor:pointer" onclick="openDetail('${w.id}');switchTab('list',document.querySelector('.tab'))"><span style="font-size:12px">${escH(w.naam)}</span><span style="margin-left:auto;font-size:11px;color:var(--muted)">${w.land}</span></div>`).join('')
    : '<div style="color:var(--muted);font-size:12px;padding:6px 0">Nog geen 5-sterren wijnen</div>';
}

// ── TABS ───────────────────────────────────────────────────────────────
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  if (el) el.classList.add('on');
  document.getElementById('listView').style.display = tab === 'list' ? '' : 'none';
  document.getElementById('statsView').classList.toggle('on', tab === 'stats');
  document.getElementById('fabBtn').style.display = tab === 'list' ? '' : 'none';
}

// ── EXPORT ─────────────────────────────────────────────────────────────
function exportCSV() {
  const cols = ['naam','producent','soort','land','regio','subregio','druif','jaar','winkel','datum','prijs','score','opmerkingen'];
  const rows = wines.map(w => cols.map(c => `"${String(w[c]??'').replace(/"/g,'""')}"`).join(','));
  const blob = new Blob(['\uFEFF' + [cols.join(','), ...rows].join('\n')], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'MijnWijn.csv';
  a.click();
  toast('↓ CSV gedownload');
}

// ── GOOGLE DRIVE ────────────────────────────────────────────────────────
async function getDriveToken() {
  try {
    return await new Promise((res, rej) => {
      if (typeof google === 'undefined') return rej('no gapi');
      google.accounts.oauth2.initTokenClient({
        client_id: '',
        scope: 'https://www.googleapis.com/auth/drive.file',
        callback: r => r.error ? rej(r.error) : res(r.access_token)
      }).requestAccessToken({prompt:''});
    });
  } catch { return null; }
}

async function driveReq(path, opts = {}) {
  const token = await getDriveToken();
  if (!token) return null;
  const r = await fetch('https://www.googleapis.com/' + path, {
    ...opts, headers: { 'Authorization': 'Bearer ' + token, ...(opts.headers||{}) }
  });
  return r.ok ? r : null;
}

function setDrive(state, msg) {
  const d = document.getElementById('driveDot');
  d.className = 'dot' + (state === 'ok' ? ' ok' : state === 'busy' ? ' busy' : '');
  document.getElementById('driveLabel').textContent = msg;
}

async function syncDrive() {
  setDrive('busy', 'Synchroniseren…');
  try {
    const sr = await driveReq(`drive/v3/files?q=name='${DRIVE_FILE}'+and+trashed=false&fields=files(id)`);
    if (!sr) { setDrive('err', 'Geen toegang tot Drive'); return; }
    const found = (await sr.json()).files;
    if (found.length) {
      driveFileId = found[0].id;
      const dl = await driveReq(`drive/v3/files/${driveFileId}?alt=media`);
      if (dl) {
        wines = await dl.json();
        renderList(); renderStats();
        setDrive('ok', `Gesynchroniseerd — ${wines.length} wijnen`);
        toast('✓ Geladen vanuit Google Drive');
        return;
      }
    }
    await uploadDrive();
  } catch (e) { setDrive('err', 'Sync mislukt'); }
}

async function uploadDrive() {
  const json = JSON.stringify(wines);
  const meta = JSON.stringify({ name: DRIVE_FILE, mimeType: 'application/json' });
  const b = `--wb\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--wb\r\nContent-Type: application/json\r\n\r\n${json}\r\n--wb--`;
  const method = driveFileId ? 'PATCH' : 'POST';
  const url = driveFileId ? `upload/drive/v3/files/${driveFileId}?uploadType=multipart` : `upload/drive/v3/files?uploadType=multipart`;
  const r = await driveReq(url, { method, headers:{'Content-Type':'multipart/related; boundary=wb'}, body: b });
  if (r) { const f = await r.json(); driveFileId = f.id; setDrive('ok', `Opgeslagen — ${wines.length} wijnen`); }
  else setDrive('err', 'Opslaan mislukt');
}

function autoSave() { if (driveFileId) uploadDrive(); }

// ── TOAST ──────────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 2800);
}

// ── BOOT ───────────────────────────────────────────────────────────────
initDropdowns();
renderList();
renderStats();
</script>
